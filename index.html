<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atlas Research Hub</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2171b5;
      color: white;
      padding: 10px;
      text-align: center;
    }
    header img {
      height: 60px;
      vertical-align: middle;
    }
    nav {
      background: #084594;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    .map {
      height: 500px;
      margin: 20px;
      border: 2px solid #2171b5;
    }
  </style>
</head>
<body>
  <header>
    <img src="atlas_logo.png" alt="Atlas Research Logo"/>
    <h1>Atlas Research Hub</h1>
  </header>

  <nav>
    <a href="#map1">Rainfall – Dodoma</a>
    <!-- Add more links for other maps later -->
  </nav>

  <!-- Map container -->
  <div id="map1" class="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Rainfall – Dodoma
    var map1 = L.map('map1').setView([-6.2, 35.0], 7);

    L.tileLayer(
      'https://earthengine.googleapis.com/v1/projects/ee-nelssua/maps/8d74c004e3361e2969c5d688747a079f-2a97cdfa1d15624faadd1d2fa0df2206/tiles/{z}/{x}/{y}',
      {
        attribution: 'Rainfall data © Google Earth Engine'
      }
    ).addTo(map1);
  </script>
</body>
</html>
